<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maplebot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="overlay">
    <header id="titlebar">
      <button id="profile-trigger" type="button" class="profile-pill" aria-haspopup="listbox">
        <span id="profile-name">Adventurer</span>
        <span id="profile-level" class="profile-lv">10</span>
        <span class="profile-chevron">▾</span>
      </button>
      <div class="controls">
        <button id="btn-settings" title="Settings">⚙</button>
        <button id="btn-lock" title="Click-through (F8)">○</button>
        <button id="btn-tray" title="Minimize">−</button>
        <button id="btn-close" title="Quit">×</button>
      </div>
      <div id="profile-menu" class="profile-menu hidden" role="listbox">
        <div id="profile-list"></div>
        <div class="profile-menu-row">
          <input id="profile-level-edit" type="number" min="1" max="200" class="profile-level-edit" placeholder="Lv" title="Level" />
          <select id="profile-job" class="ui-select profile-job-select" title="Class">
            <option value="any">Any</option>
            <option value="warrior">Warrior</option>
            <option value="magician">Mage</option>
            <option value="bowman">Bowman</option>
            <option value="thief">Thief</option>
            <option value="pirate">Pirate</option>
          </select>
        </div>
        <div class="profile-menu-row">
          <input id="profile-new-name" type="text" placeholder="New name…" spellcheck="false" />
          <button id="btn-add-profile" type="button">+</button>
        </div>
        <div class="profile-menu-mini">
          <button id="btn-export-profile" type="button">Export</button>
          <button id="btn-import-profile" type="button">Import</button>
        </div>
      </div>
    </header>

    <section id="nav">
      <div class="nav-guide-row">
        <button id="btn-prev" type="button" title="Prev guide (F9)">‹</button>
        <select id="guide-select" title="Guide"></select>
        <button id="btn-next" type="button" title="Next guide (F9)">›</button>
      </div>
      <div class="nav-tools-row">
        <label class="nav-lv">Lv<input id="level-input" type="number" min="1" max="200" value="10" title="Level" /></label>
        <button id="btn-fav" type="button" title="Favorite">☆</button>
        <span class="nav-tools-spacer"></span>
        <button id="btn-filter-job" type="button" class="nav-chip active" title="Class filter">Mine</button>
        <button id="btn-library" type="button" title="Library (F10)">☰</button>
      </div>
    </section>

    <section id="settings-panel" class="hidden">
      <label>OCR <input id="set-ocr-conf" type="range" min="40" max="95" value="45" /></label>
      <label>Match <input id="set-ocr-match" type="range" min="50" max="95" value="75" /> <span id="set-ocr-match-val">75%</span></label>
      <label><input id="set-ocr-fast" type="checkbox" /> Fast OCR</label>
      <label>Monitor <select id="set-display" class="ui-select"></select></label>
      <button id="ocr-calibrate" type="button" class="settings-btn">Calibrate map (CAL)</button>
      <button id="btn-ocr-preview" type="button" class="settings-btn">Preview CAL region</button>
      <div id="ocr-cal-preview" class="ocr-cal-preview hidden">
        <img id="ocr-cal-preview-img" alt="OCR crop" />
        <span id="ocr-cal-preview-text"></span>
      </div>
      <label><input id="set-hide-skipped" type="checkbox" /> Hide skipped</label>
      <label><input id="set-collapse-done" type="checkbox" checked /> Collapse done</label>
      <label>Opacity <button id="btn-opacity" type="button" class="inline-btn">◐</button></label>
      <label>Collapse bar <button id="btn-collapse" type="button" class="inline-btn">—</button></label>
      <label>On-top
        <select id="set-on-top" class="ui-select">
          <option value="screen-saver">High</option>
          <option value="normal">Normal</option>
        </select>
      </label>
    </section>

    <div id="ocr-strip">
      <button id="ocr-toggle" type="button" title="Map OCR">
        <span id="ocr-toggle-state">OCR</span>
      </button>
      <span id="ocr-map-name">—</span>
      <span id="ocr-map-match"></span>
      <span id="ocr-map-hint" class="ocr-hint"></span>
      <span id="ocr-map-conf"></span>
    </div>

    <main id="steps"></main>

    <footer id="foot">
      <span id="progress-label"></span>
      <span id="update-label" class="update-label hidden"></span>
      <span id="ocr-status"></span>
      <span id="lock-label"></span>
    </footer>
  </div>

  <div id="db-panel-backdrop" class="modal-backdrop"></div>
  <aside id="db-panel" class="slide-panel">
    <header class="panel-header">
      <span id="db-panel-type" class="panel-type"></span>
      <h2 id="db-panel-title"></h2>
      <button id="db-panel-close" type="button">×</button>
    </header>
    <div id="db-panel-body" class="panel-body"></div>
  </aside>

  <script src="profiles.js"></script>
  <script src="db.js"></script>
  <script src="ocr-match.js"></script>
  <script src="db-panel.js"></script>
  <script src="app.js"></script>
</body>
</html>
